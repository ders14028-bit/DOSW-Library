name: DOSW Library CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
      - master

jobs:


  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile project (Maven compile phase)
        run: ./mvnw compile -B

      # Save the compiled classes so the next job can skip recompilation
      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: target/


  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Download pre-compiled classes from the build job
      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: compiled-classes
          path: target/

      # Run verify — Maven will skip recompilation because classes exist
      # Tests run with the 'relational' + 'test' profiles using H2 in-memory DB
      - name: Run tests (Maven verify phase)
        run: ./mvnw verify -B -DskipCompile=true -P test
        env:
          SPRING_PROFILES_ACTIVE: relational,test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/


  analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: compiled-classes
          path: target/

      - name: Download JaCoCo coverage report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Run Maven checkstyle/spotbugs for static analysis
      - name: Run static analysis (checkstyle)
        run: ./mvnw checkstyle:check -B
        continue-on-error: true

      # Generate JaCoCo coverage report summary
      - name: Display JaCoCo coverage summary
        run: |
          echo "========================================"
          echo "  CODE COVERAGE SUMMARY"
          echo "========================================"
          if [ -f target/site/jacoco/index.html ]; then
            echo "JaCoCo report generated successfully."
            echo "Coverage report is available at: target/site/jacoco/index.html"
          else
            echo "No coverage report found — running report generation."
            ./mvnw jacoco:report -B -DskipTests=true
          fi


  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy placeholder
        run: echo "En construcción ..."
