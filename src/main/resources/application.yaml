  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
  data:
    mongodb:
      uri: mongodb+srv://ders14028_db_user:Ders.210021@cluster0.1p8nobv.mongodb.net/?appName=Cluster0
      database: dosw_library

---
spring:
  config:
    activate:
      on-profile: relational
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dosw_library}
    username: ${SPRING_DATASOURCE_USERNAME:dosw_user}
    password: ${SPRING_DATASOURCE_PASSWORD:dosw_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
